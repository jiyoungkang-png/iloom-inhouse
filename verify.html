<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>시험성적서 위변조 확인 · 일룸 수면과학연구소</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard Variable',Pretendard,'Malgun Gothic',sans-serif;background:#f0f4f8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:32px 16px}
.wrap{width:100%;max-width:520px}
.header{text-align:center;margin-bottom:28px}
.header .logo-txt{font-size:13px;font-weight:700;color:#e60012;letter-spacing:0.5px;margin-bottom:6px}
.header h1{font-size:20px;font-weight:900;color:#1f2937}
.card{background:#fff;border-radius:20px;padding:28px 24px;box-shadow:0 8px 32px rgba(0,0,0,.10);margin-bottom:16px}
.status-box{text-align:center;padding:20px 0 16px}
.status-icon{font-size:52px;margin-bottom:10px}
.status-title{font-size:22px;font-weight:900;margin-bottom:6px}
.status-sub{font-size:14px;color:#6b7280}
.verified .status-title{color:#008a3d}
.invalid .status-title{color:#e60012}
.loading .status-title{color:#6b7280}
.divider{border:none;border-top:1px solid #f3f4f6;margin:18px 0}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid #f9fafb;gap:12px}
.info-row:last-child{border-bottom:none}
.info-key{font-size:12px;font-weight:700;color:#9ca3af;min-width:110px;flex-shrink:0}
.info-val{font-size:13px;font-weight:600;color:#1f2937;text-align:right;word-break:break-all}
.checks{margin-top:16px;display:flex;flex-direction:column;gap:8px}
.chk-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;font-size:13px;font-weight:700}
.chk-row.ok{background:#f0fdf4;color:#16a34a}
.chk-row.fail{background:#fff5f5;color:#e60012}
.chk-icon{font-size:18px;flex-shrink:0}
.footer{text-align:center;font-size:11px;color:#9ca3af;margin-top:8px}
.spinner{display:inline-block;width:36px;height:36px;border:4px solid #f3f4f6;border-top-color:#e60012;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.tag{display:inline-block;font-size:11px;font-weight:700;border-radius:99px;padding:2px 10px;vertical-align:middle}
.tag.kolas{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.tag.internal{background:#f9fafb;color:#6b7280;border:1px solid #e5e7eb}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo-txt">일룸 수면과학연구소</div>
    <h1>시험성적서 진위 확인</h1>
  </div>
  <div class="card">
    <div id="statusBox" class="status-box loading">
      <div><div class="spinner"></div></div>
      <div class="status-title">확인 중입니다...</div>
      <div class="status-sub">Supabase에서 성적서를 조회하고 있습니다.</div>
    </div>
    <div id="infoSection" style="display:none">
      <hr class="divider">
      <div id="infoRows"></div>
      <div id="checksSection" class="checks"></div>
    </div>
  </div>
  <div class="footer">
    본 QR코드는 일룸 수면과학연구소 시험성적서의 위변조 방지를 위해 발행됩니다.<br>
    문의: 품질보증팀 · 기술책임자 010-9422-5518
  </div>
</div>

<script>
const SUPA_URL = 'https://cfxjqjgvumdemeuzwhxg.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmeGpxamd2dW1kZW1ldXp3aHhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExOTY5MDIsImV4cCI6MjA5Njc3MjkwMn0.2GyUEaAEbphYmRvXurObtyV4AAQnsEut9dD90i1ws4Y';

async function sha256Token(r){
  var str=[r.receiptNo||'',r.issuedDate||'',r.sampleName||'',r.tester||'',r.issuedAt||''].join('||');
  var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('').slice(0,24);
}

function fmtKST(s){
  if(!s) return '-';
  var d=new Date(s);
  if(isNaN(d)) return s;
  var kst=new Date(d.getTime()+9*60*60*1000);
  var p=function(n){return String(n).padStart(2,'0');};
  return kst.getUTCFullYear()+'-'+p(kst.getUTCMonth()+1)+'-'+p(kst.getUTCDate())+' '+p(kst.getUTCHours())+':'+p(kst.getUTCMinutes());
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function setStatus(type, icon, title, sub){
  var box=document.getElementById('statusBox');
  box.className='status-box '+type;
  box.innerHTML='<div class="status-icon">'+icon+'</div>'
    +'<div class="status-title">'+title+'</div>'
    +'<div class="status-sub">'+sub+'</div>';
}

function addInfo(key, val){
  var rows=document.getElementById('infoRows');
  var d=document.createElement('div');
  d.className='info-row';
  d.innerHTML='<span class="info-key">'+key+'</span><span class="info-val">'+val+'</span>';
  rows.appendChild(d);
}

function addCheck(ok, text){
  var sec=document.getElementById('checksSection');
  var d=document.createElement('div');
  d.className='chk-row '+(ok?'ok':'fail');
  d.innerHTML='<span class="chk-icon">'+(ok?'✔':'✖')+'</span><span>'+text+'</span>';
  sec.appendChild(d);
}

async function verify(){
  var params=new URLSearchParams(window.location.search);
  var id=params.get('id');
  var token=params.get('t');

  if(!id||!token){
    setStatus('invalid','⚠️','QR 코드 오류','유효하지 않은 QR 코드입니다.');
    return;
  }

  var report=null;
  try{
    var resp=await fetch(SUPA_URL+'/rest/v1/reports?id=eq.'+encodeURIComponent(id),{
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Accept':'application/json'}
    });
    var rows=await resp.json();
    if(Array.isArray(rows)&&rows.length>0&&rows[0].data) report=rows[0].data;
  } catch(e){
    setStatus('invalid','🔴','서버 연결 실패','Supabase에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.');
    return;
  }

  if(!report){
    setStatus('invalid','🔴','성적서를 찾을 수 없습니다','등록되지 않은 성적서이거나 삭제된 성적서입니다.');
    return;
  }

  // 토큰 검증
  var expected = await sha256Token(report);
  var tokenMatch = (expected === token);
  var isIssued = !!report.issued;
  var isVerified = tokenMatch && isIssued;

  if(isVerified){
    setStatus('verified','🟢','시험성적서가 정상 확인되었습니다','위변조 없이 정상 발행된 성적서입니다.');
  } else if(!tokenMatch){
    setStatus('invalid','🔴','위변조 의심 성적서','토큰이 일치하지 않습니다. 위변조 가능성이 있습니다.');
  } else {
    setStatus('invalid','🟡','발행 완료되지 않은 성적서','최종 발행 처리가 완료되지 않은 성적서입니다.');
  }

  // 상세 정보 표시
  var infoSection=document.getElementById('infoSection');
  infoSection.style.display='';
  var isKolas=(report.purpose||'').includes('KOLAS용');
  addInfo('시험성적서 번호', '<b>'+esc(report.receiptNo||'-')+'</b>');
  addInfo('시험의뢰번호', esc(report.receiptNo||'-'));
  addInfo('발행일', esc(report.issuedDate||'-'));
  addInfo('발행기관', '일룸 수면과학연구소'+(isKolas?' &nbsp;<span class="tag kolas">KOLAS 공인시험기관</span>':'<span class="tag internal"> &nbsp;내부시험</span>'));
  addInfo('시료명', esc(report.sampleName||'-'));
  addInfo('의뢰자', esc(report.requestDept||'-'));
  addInfo('KOLAS 인정 여부', isKolas?'✔ KOLAS 인정 시험':'내부 시험');
  addInfo('발행 시각 (KST)', fmtKST(report.issuedAt||report.savedAt||''));
  addInfo('전자문서 상태', isIssued?'정상':'미발행');
  addInfo('재발행 여부', (report.unlockHistory&&report.unlockHistory.length>0)?'재발행 이력 있음':'없음');

  addCheck(isIssued, '정상 발행');
  addCheck(tokenMatch, tokenMatch?'위변조 없음':'⚠ 위변조 의심 — 발급기관 확인 필요');
  addCheck(isVerified, '유효한 시험성적서');
}

verify();
</script>
</body>
</html>
